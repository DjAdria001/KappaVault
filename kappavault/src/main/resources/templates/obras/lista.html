<!DOCTYPE html>

<!-- DOCUMENTO HTML5 -->
<html xmlns:th="http://www.thymeleaf.org" lang="es">

<head>

    <!-- CONFIGURACIÓN BÁSICA -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- TÍTULO DE LA PÁGINA -->
    <title>Catálogo | KappaVault</title>

    <!-- ICONO DE LA PESTAÑA -->
    <link rel="icon" type="image/png" href="/images/logo2.png">

    <!-- ARCHIVO CSS -->
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

<!-- HEADER PRINCIPAL -->
<header class="container navbar">

    <!-- LOGO -->
    <div class="logo-box">

        <img src="/images/logo2.png"
             alt="KappaVault Logo"
             class="logo-img">

        <h2 class="logo">
            KappaVault
        </h2>

    </div>

    <!-- MENÚ DE NAVEGACIÓN -->
    <nav class="nav-links">
        <a href="/">Inicio</a>
        <a href="/obras">Catálogo</a>
    </nav>

</header>

<!-- CONTENIDO PRINCIPAL -->
<main class="container">

    <!-- TARJETA FORMULARIO -->
    <section class="form-card">

        <!-- TÍTULO FORMULARIO -->
        <h1 class="section-title">
            Crear nueva obra
        </h1>

        <!-- FORMULARIO CREAR OBRA -->
        <form th:action="@{/obras/nuevo}"
              th:object="${nuevaObra}"
              method="post">

            <!-- INPUT TÍTULO -->
            <input type="text"
                   th:field="*{titulo}"
                   placeholder="Título del Anime"
                   required />

            <!-- INPUT TIPO -->
            <input type="text"
                   th:field="*{tipo}"
                   placeholder="Tipo (Anime, Manga, etc.)" />

            <!-- INPUT GÉNERO -->
            <input type="text"
                   th:field="*{genero}"
                   placeholder="Género" />

            <!-- INPUT AÑO -->
            <input type="number"
                   th:field="*{anio}"
                   placeholder="Año" />

            <!-- INPUT URL IMAGEN -->
            <input type="text"
                   th:field="*{imagenUrl}"
                   placeholder="URL de la Imagen" />

            <!-- BOTÓN GUARDAR -->
            <button type="submit">
                Guardar Anime
            </button>

        </form>

    </section>

    <!-- TÍTULO LISTADO -->
    <h1 class="section-title">
        Listado de obras
    </h1>

    <!-- GRID DE OBRAS -->
    <section class="grid">

        <!-- TARJETA DE CADA OBRA -->
        <article class="card"
                 th:each="obra : ${obras}">

            <!-- IMAGEN DE LA OBRA -->
            <img th:src="${obra.imagenUrl}"
                 alt="Poster">

            <!-- CONTENIDO TARJETA -->
            <div class="card-content">

                <!-- TIPO DE OBRA -->
                <span class="badge"
                      th:text="${obra.tipo}">
                    Anime
                </span>

                <!-- TÍTULO -->
                <h3 th:text="${obra.titulo}">
                    Título
                </h3>

                <!-- GÉNERO Y AÑO -->
                <p>
                    <span th:text="${obra.genero}"></span> ·
                    <span th:text="${obra.anio}"></span>
                </p>

                <!-- BOTÓN DETALLE -->
                <a class="btn btn-primary"
                   th:href="@{'/obras/' + ${obra.id}}">

                    Ver detalle

                </a>

            </div>

        </article>

    </section>

</main>

<!-- FOOTER -->
<footer>
    © 2026 KappaVault
</footer>

</body>
</html>
