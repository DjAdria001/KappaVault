<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title th:text="${obra.titulo}">Detalle</title>
    <link rel="icon" type="image/png" href="/images/logo2.png">

    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

<header class="container navbar">

    <div class="logo-box">

        <img src="/images/logo2.png"
             alt="KappaVault Logo"
             class="logo-img">

        <h2 class="logo">
            KappaVault
        </h2>

    </div>

    <nav class="nav-links">
        <a href="/">Inicio</a>
        <a href="/obras">Catálogo</a>
    </nav>

</header>

<main class="container">

    <section class="detail-layout">

        <img class="poster"
             th:src="${obra.imagenUrl}"
             alt="Poster">

        <article class="panel">

            <h1 th:text="${obra.titulo}">
                Título
            </h1>

            <form th:action="@{/obras/eliminar/{id}(id=${obra.id})}" 
                  method="post" 
                  onsubmit="return confirm('¿Estás seguro de que deseas eliminar definitivamente este anime?');" 
                  style="margin: 15px 0 25px 0;">
                <button type="submit" class="btn" style="background: linear-gradient(90deg, #ef4444, #b91c1c); margin-top: 0; font-size: 0.9rem; padding: 10px 20px;">
                    Eliminar Anime
                </button>
            </form>

            <div class="meta">

                <span class="badge" th:text="${obra.tipo}">
                    Anime
                </span>

                <span class="badge" th:text="${obra.genero}">
                    Acción
                </span>

                <span class="badge" th:text="${obra.anio}">
                    2025
                </span>

            </div>

            <h2>Reviews de la comunidad</h2>

            <p th:if="${#lists.isEmpty(obra.reviews)}"
               class="empty">
                Aún no hay reviews para esta obra.
            </p>

            <div class="review" th:each="r : ${obra.reviews}">

                <div class="review-top" style="display: flex; justify-content: space-between; align-items: center; width: 100%;">

                    <div style="display: flex; gap: 15px; align-items: center;">
                        <strong th:text="${r.estado}">Completado</strong>
                        <span>⭐ <span th:text="${r.puntuacion}"></span>/10</span>
                    </div>

                    <form th:action="@{/obras/{obraId}/review/eliminar/{reviewId}(obraId=${obra.id}, reviewId=${r.id})}" 
                          method="post" 
                          onsubmit="return confirm('¿Seguro que quieres borrar esta review?');"
                          style="margin: 0; display: inline;">
                        <button type="submit" style="background: none; border: none; color: #ef4444; font-weight: bold; cursor: pointer; font-size: 1.1rem; padding: 2px 8px; opacity: 0.7; transition: 0.2s;" onmouseover="this.style.opacity='1'" onmouseout="this.style.opacity='0.7'">
                            ✕
                        </button>
                    </form>

                </div>

                <p th:text="${r.comentario}" style="margin-top: 8px;">
                    Comentario
                </p>

            </div>

            <h2 class="section-title" style="margin-top: 30px;">
                Publicar review
            </h2>

            <form method="post"
                  th:action="@{/obras/{id}/review(id=${obra.id})}"
                  th:object="${review}">

                <div class="form-grid">

                    <input type="text"
                           th:field="*{estado}"
                           placeholder="Nombre/Apodo"
                           required>

                    <input type="number"
                           min="1"
                           max="10"
                           th:field="*{puntuacion}"
                           placeholder="Puntuación"
                           required>

                    <textarea class="full"
                              rows="6"
                              th:field="*{comentario}"
                              placeholder="Escribe tu review"
                              required></textarea>

                    <button type="submit"
                            class="btn btn-primary full">
                        Publicar review
                    </button>

                </div>

            </form>

        </article>

    </section>

</main>

<footer>
    © 2026 KappaVault
</footer>

</body>
</html>
