<!DOCTYPE html>

<!-- DOCUMENTO HTML5 -->
<html xmlns:th="http://www.thymeleaf.org" lang="es">

<head>

    <!-- CONFIGURACIÓN BÁSICA -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- TÍTULO DINÁMICO -->
    <title th:text="${obra.titulo}">Detalle</title>

    <!-- ICONO DE LA PESTAÑA -->
    <link rel="icon" type="image/png" href="/images/logo2.png">

    <!-- ARCHIVO CSS -->
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

<!-- HEADER PRINCIPAL -->
<header class="container navbar">

    <!-- LOGO -->
    <div class="logo-box">

        <img src="/images/logo2.png"
             alt="KappaVault Logo"
             class="logo-img">

        <h2 class="logo">
            KappaVault
        </h2>

    </div>

    <!-- MENÚ DE NAVEGACIÓN -->
    <nav class="nav-links">
        <a href="/">Inicio</a>
        <a href="/obras">Catálogo</a>
    </nav>

</header>

<!-- CONTENIDO PRINCIPAL -->
<main class="container">

    <!-- LAYOUT DETALLE -->
    <section class="detail-layout">

        <!-- IMAGEN DE LA OBRA -->
        <img class="poster"
             th:src="${obra.imagenUrl}"
             alt="Poster">

        <!-- PANEL DE INFORMACIÓN -->
        <article class="panel">

            <!-- TÍTULO DE LA OBRA -->
            <h1 th:text="${obra.titulo}">
                Título
            </h1>

            <!-- FORMULARIO ELIMINAR OBRA -->
            <form th:action="@{/obras/eliminar/{id}(id=${obra.id})}" 
                  method="post" 
                  onsubmit="return confirm('¿Estás seguro de que deseas eliminar definitivamente este anime?');" 
                  style="margin: 15px 0 25px 0;">

                <button type="submit"
                        class="btn"
                        style="background: linear-gradient(90deg, #ef4444, #b91c1c); margin-top: 0; font-size: 0.9rem; padding: 10px 20px;">

                    Eliminar Anime

                </button>

            </form>

            <!-- DATOS DE LA OBRA -->
            <div class="meta">

                <span class="badge" th:text="${obra.tipo}">
                    Anime
                </span>

                <span class="badge" th:text="${obra.genero}">
                    Acción
                </span>

                <span class="badge" th:text="${obra.anio}">
                    2025
                </span>

            </div>

            <!-- TÍTULO REVIEWS -->
            <h2>Reviews de la comunidad</h2>

            <!-- MENSAJE SI NO HAY REVIEWS -->
            <p th:if="${#lists.isEmpty(obra.reviews)}"
               class="empty">

                Aún no hay reviews para esta obra.

            </p>

            <!-- LISTA DE REVIEWS -->
            <div class="review" th:each="r : ${obra.reviews}">

                <!-- CABECERA REVIEW -->
                <div class="review-top"
                     style="display: flex; justify-content: space-between; align-items: center; width: 100%;">

                    <!-- ESTADO Y PUNTUACIÓN -->
                    <div style="display: flex; gap: 15px; align-items: center;">

                        <strong th:text="${r.estado}">
                            Completado
                        </strong>

                        <span>
                            ⭐ <span th:text="${r.puntuacion}"></span>/10
                        </span>

                    </div>

                    <!-- FORMULARIO ELIMINAR REVIEW -->
                    <form th:action="@{/obras/{obraId}/review/eliminar/{reviewId}(obraId=${obra.id}, reviewId=${r.id})}" 
                          method="post" 
                          onsubmit="return confirm('¿Seguro que quieres borrar esta review?');"
                          style="margin: 0; display: inline;">

                        <button type="submit"
                                style="background: none; border: none; color: #ef4444; font-weight: bold; cursor: pointer; font-size: 1.1rem; padding: 2px 8px; opacity: 0.7; transition: 0.2s;"
                                onmouseover="this.style.opacity='1'"
                                onmouseout="this.style.opacity='0.7'">

                            ✕

                        </button>

                    </form>

                </div>

                <!-- COMENTARIO REVIEW -->
                <p th:text="${r.comentario}" style="margin-top: 8px;">
                    Comentario
                </p>

            </div>

            <!-- TÍTULO FORMULARIO -->
            <h2 class="section-title" style="margin-top: 30px;">
                Publicar review
            </h2>

            <!-- FORMULARIO CREAR REVIEW -->
            <form method="post"
                  th:action="@{/obras/{id}/review(id=${obra.id})}"
                  th:object="${review}">

                <div class="form-grid">

                    <!-- INPUT ESTADO -->
                    <input type="text"
                           th:field="*{estado}"
                           placeholder="Nombre/Apodo"
                           required>

                    <!-- INPUT PUNTUACIÓN -->
                    <input type="number"
                           min="1"
                           max="10"
                           th:field="*{puntuacion}"
                           placeholder="Puntuación"
                           required>

                    <!-- TEXTAREA COMENTARIO -->
                    <textarea class="full"
                              rows="6"
                              th:field="*{comentario}"
                              placeholder="Escribe tu review"
                              required></textarea>

                    <!-- BOTÓN PUBLICAR -->
                    <button type="submit"
                            class="btn btn-primary full">

                        Publicar review

                    </button>

                </div>

            </form>

        </article>

    </section>

</main>

<!-- FOOTER -->
<footer>
    © 2026 KappaVault
</footer>

</body>
</html>
